<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vessel Architecture Control</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #020617; color: #f8fafc; padding: 2rem; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 1rem; margin-bottom: 2rem; }
        .btn { background: #10b981; color: white; border: none; padding: 0.75rem 1.5rem; font-weight: bold; border-radius: 0.5rem; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #059669; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #b91c1c; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1.5rem; }
        .shard-card { background: #0f172a; padding: 1.5rem; border-radius: 0.75rem; border: 1px solid #1e293b; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; gap: 1rem; transition: border-color 0.3s ease; }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; transition: background 0.3s ease; box-shadow: 0 0 8px rgba(0,0,0,0.5); }
        
        .action-group { display: flex; gap: 0.6rem; }
        .btn-action { border: none; padding: 0.4rem 0.8rem; font-size: 0.7rem; font-weight: bold; border-radius: 0.3rem; cursor: pointer; color: white; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-restart { background: #f59e0b; }
        .btn-restart:hover { background: #d97706; }
        .btn-kill { background: #ef4444; }
        .btn-kill:hover { background: #dc2626; }
        
        .telemetry-box { background: #1e293b; padding: 0.8rem 1rem; border-radius: 0.5rem; font-family: 'Courier New', Courier, monospace; color: #a7f3d0; border-left: 4px solid #10b981; font-size: 0.85rem; display: flex; justify-content: space-between; }
        
        .record-scroll { height: 160px; overflow-y: auto; background: #020617; border-radius: 0.4rem; padding: 0.5rem 1rem; }
        .record-scroll::-webkit-scrollbar { width: 6px; }
        .record-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        
        .record-row { display: flex; justify-content: space-between; border-bottom: 1px solid #1e293b; padding: 0.6rem 0; font-size: 0.8rem; }
        .record-row:last-child { border-bottom: none; }
        .record-key { color: #94a3b8; font-weight: 500; }
        .record-val { font-family: monospace; color: #6ee7b7; text-align: right; }
        
        .dead-node { border-color: #ef4444 !important; }
        .restarting { animation: pulse 1.5s infinite ease-in-out; border-color: #f59e0b !important; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #0f172a; width: 80%; max-width: 900px; max-height: 85vh; border-radius: 0.75rem; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; background: #1e293b; }
        .modal-body { padding: 0; overflow-y: auto; flex-grow: 1; background: #020617; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
    <div class="header">
        <div>
            <h1 style="margin: 0; font-size: 1.5rem;">Vessel Container Array</h1>
            <div style="color: #64748b; font-size: 0.85rem; margin-top: 0.2rem;">Distributed Architecture Telemetry</div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-danger" onclick="globalKill()">Shutdown Cluster</button>
            <button class="btn" id="unshard-btn" onclick="triggerUnshard()">Build Unsharded Database</button>
            <button class="btn" id="back-btn" style="display:none; background:#334155" onclick="showCluster()">Return to Cluster View</button>
        </div>
    </div>
    
    <div id="analytics-banner" style="background: #0f172a; padding: 1.5rem; border-radius: 0.75rem; border: 1px solid #334155; margin-bottom: 2rem; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);">
        <div style="display: flex; flex-direction: column; justify-content: center; border-right: 1px solid #1e293b; padding-right: 1rem;">
            <div style="color: #64748b; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: bold; margin-bottom: 0.5rem;">Engine Status</div>
            <div style="display: flex; align-items: center; gap: 8px; color: #f8fafc; font-size: 1.1rem;">
                <span style="height: 10px; width: 10px; background: #3b82f6; border-radius: 50%; box-shadow: 0 0 8px #3b82f6;"></span>
                Virtual Thread Aggregator
            </div>
        </div>
        <div style="display: flex; flex-direction: column; justify-content: center; border-right: 1px solid #1e293b; padding-right: 1rem;">
            <div style="color: #64748b; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: bold; margin-bottom: 0.5rem;">Cluster Availability</div>
            <div style="color: #10b981; font-size: 1.5rem; font-weight: bold; font-family: monospace;">
                <span id="sg-nodes">0/0</span> <span style="font-size: 1rem; color: #94a3b8; font-family: 'Segoe UI', sans-serif;">Nodes Online</span>
            </div>
        </div>
        <div style="display: flex; flex-direction: column; justify-content: center; border-right: 1px solid #1e293b; padding-right: 1rem;">
            <div style="color: #64748b; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: bold; margin-bottom: 0.5rem;">Aggregated Latency</div>
            <div style="color: #10b981; font-size: 1.5rem; font-weight: bold; font-family: monospace;">
                <span id="sg-actual">0</span> <span style="font-size: 1rem; color: #94a3b8; font-family: 'Segoe UI', sans-serif;">ms</span>
            </div>
        </div>
        <div style="display: flex; flex-direction: column; justify-content: center;">
            <div style="color: #64748b; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: bold; margin-bottom: 0.5rem;">Total Cluster Records</div>
            <div style="color: #f8fafc; font-size: 1.5rem; font-weight: bold; font-family: monospace;">
                <span id="sg-total-records">0</span>
            </div>
        </div>
    </div>

    <div id="sharded-view" class="grid"></div>
    
    <table id="unsharded-view" style="width: 100%; display: none; background:#0f172a; color:#cbd5e1; border-collapse: collapse; border-radius: 0.5rem; overflow: hidden;">
        <thead style="background: #1e293b;">
            <tr style="text-align:left; color:#94a3b8">
                <th style="padding:1rem">Timestamp</th>
                <th>Database ID</th>
                <th>Payload</th>
                <th>Source Node</th>
            </tr>
        </thead>
        <tbody id="unsharded-body"></tbody>
    </table>

    <div id="inspector-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 id="modal-title" style="margin: 0; font-size: 1.25rem; color: #f8fafc;">Data Inspector</h2>
                    <div style="display: flex; align-items: center; gap: 1rem; margin-top: 6px;">
                        <div id="modal-subtitle" style="color: #64748b; font-size: 0.85rem;">Showing live database rows</div>
                        <div style="display: flex; gap: 0.25rem; background: #0f172a; padding: 2px; border-radius: 0.25rem; border: 1px solid #1e293b;">
                            <button onclick="filterType('all')" class="filter-pill active" style="background: #1e293b; border: none; color: #f8fafc; font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; cursor: pointer;">All</button>
                            <button onclick="filterType('sys_')" class="filter-pill" style="background: transparent; border: none; color: #64748b; font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; cursor: pointer;">System</button>
                            <button onclick="filterType('usr_')" class="filter-pill" style="background: transparent; border: none; color: #64748b; font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; cursor: pointer;">Transactions</button>
                        </div>
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <input type="text" id="modal-search" placeholder="Search..." oninput="applyModalFilters()" style="background: #020617; border: 1px solid #334155; color: #cbd5e1; padding: 0.5rem 0.75rem; border-radius: 0.375rem; font-size: 0.85rem; width: 220px; outline: none;">
                    <button onclick="closeInspector()" style="background: transparent; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; padding: 0 0.5rem;">&times;</button>
                </div>
            </div>
            <div class="modal-body">
                <table style="width: 100%; border-collapse: collapse; color: #cbd5e1; text-align: left; font-size: 0.9rem;">
                    <thead style="background: #0f172a; position: sticky; top: 0;">
                        <tr>
                            <th style="padding: 1rem; border-bottom: 1px solid #334155;">ID</th>
                            <th style="padding: 1rem; border-bottom: 1px solid #334155;">Timestamp</th>
                            <th style="padding: 1rem; border-bottom: 1px solid #334155;">Key</th>
                            <th style="padding: 1rem; border-bottom: 1px solid #334155;">Payload</th>
                        </tr>
                    </thead>
                    <tbody id="modal-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let stompClient = null;

        function connectWebSocket() {
            const socket = new SockJS('/vessel-ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null; 
            stompClient.connect({}, function (frame) {
                stompClient.subscribe('/topic/telemetry', function (message) {
                    renderCluster(JSON.parse(message.body));
                });
            }, function(error) {
                setTimeout(connectWebSocket, 5000);
            });
        }

        function renderCluster(data) {
            if (document.getElementById('sharded-view').style.display === 'none') return;
            
            let shardArray = Array.isArray(data) ? data : (data.shards || []);
            if (shardArray.length === 0) return;

            let computedActive = 0;
            shardArray.forEach(s => { if (s.status === 'UP') computedActive++; });
            
            const activeNodes = data.stats ? data.stats.activeNodes : computedActive;
            const totalNodes = data.stats ? data.stats.totalNodes : shardArray.length;
            const latency = data.stats ? data.stats.actualLatencyMs : '--';
            const totalRecords = data.stats ? data.stats.totalRecords : 0;

            document.getElementById('sg-nodes').innerHTML = `${activeNodes}/${totalNodes} <span style="font-size: 1rem; color: #94a3b8; font-family: 'Segoe UI', sans-serif;">Nodes Online</span>`;
            document.getElementById('sg-actual').innerText = latency;
            document.getElementById('sg-total-records').innerText = totalRecords.toLocaleString();
            
            const grid = document.getElementById('sharded-view');
            const activeIps = new Set();
            
            shardArray.forEach(shard => {
                activeIps.add(shard.ip_address);
                const isDown = shard.status === 'DOWN';
                const isBooting = shard.status === 'BOOTING';
                const safeIp = shard.ip_address.replace(/\./g, '-');
                const cardId = 'shard-card-' + safeIp;
                let card = document.getElementById(cardId);

                if (!card) {
                    card = document.createElement('div');
                    card.id = cardId;
                    card.className = 'shard-card';
                    card.innerHTML = `
                        <div class="card-header">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <span class="status-dot"></span>
                                <strong>${shard.ip_address}</strong>
                            </div>
                            <div class="action-group">
                                <button class="btn-action" style="background: #3b82f6;" onclick="openInspector('${shard.ip_address}')">Inspect</button>
                                <button class="btn-action btn-restart" onclick="killShard('${shard.ip_address}', 'restart')">Restart</button>
                                <button class="btn-action btn-kill" onclick="killShard('${shard.ip_address}', 'kill')">Kill</button>
                            </div>
                        </div>
                        <div class="telemetry-box"></div>
                        <div class="record-scroll"></div>
                    `;
                    grid.appendChild(card);
                }

                card.classList.toggle('dead-node', isDown);
                card.classList.toggle('restarting', isBooting);
                card.querySelector('.status-dot').style.background = isDown ? '#ef4444' : isBooting ? '#f59e0b' : '#10b981';
                card.querySelector('.action-group').style.display = isDown ? 'none' : 'flex';
                
                const mem = shard.telemetry && shard.telemetry.memory_mb !== undefined ? shard.telemetry.memory_mb.toFixed(1) : '0.0';
                const cpu = shard.telemetry && shard.telemetry.cpu_usec !== undefined ? (shard.telemetry.cpu_usec / 1000000).toFixed(2) : '0.00';
                card.querySelector('.telemetry-box').innerHTML = `<span>RAM: ${mem} MB</span><span>CPU: ${cpu} s</span>`;
                
                let recordHtml = '';
                if (shard.records && shard.records.length > 0) {
                    recordHtml = shard.records.slice(0, 5).map(r => {
                        const text = typeof r === 'string' ? r : (r.payload || JSON.stringify(r));
                        const splitIndex = text.indexOf(':');
                        if (splitIndex > -1) {
                            return `<div class="record-row"><span class="record-key">${text.substring(0, splitIndex).trim()}</span><span class="record-val">${text.substring(splitIndex + 1).trim()}</span></div>`;
                        }
                        return `<div class="record-row"><span class="record-val" style="width:100%; text-align:left;">${text}</span></div>`;
                    }).join('');
                } else if (isBooting) {
                    recordHtml = '<div style="color:#f59e0b; text-align:center; padding-top:3rem;"><strong>Rebooting Container...</strong></div>';
                } else if (isDown) {
                    recordHtml = '<div style="color:#ef4444; text-align:center; padding-top:3rem;"><strong>Node Offline</strong></div>';
                } else {
                    recordHtml = '<div style="color:#64748b; text-align:center; padding-top:3rem;">Awaiting telemetry sync...</div>';
                }
                
                const recScroll = card.querySelector('.record-scroll');
                if (recScroll.innerHTML !== recordHtml) recScroll.innerHTML = recordHtml;
            });

            Array.from(grid.children).forEach(child => {
                const ipId = child.id.replace('shard-card-', '').replace(/-/g, '.');
                if (!activeIps.has(ipId)) grid.removeChild(child);
            });
        }
        function openInspector(ip) {
            document.getElementById('inspector-modal').style.display = 'flex';
            document.getElementById('modal-title').innerText = `Data Inspector: ${ip}`;
            document.getElementById('modal-table-body').innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 2rem;">Loading...</td></tr>`;

            fetch(`/api/shard-records?targetIp=${ip}`)
                .then(res => res.json())
                .then(data => {
                    if (data.length === 0) {
                        document.getElementById('modal-table-body').innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 2rem; color: #64748b;">No records found.</td></tr>`;
                        return;
                    }
                    document.getElementById('modal-table-body').innerHTML = data.map(r => `
                        <tr data-key="${r.shard_key}" class="inspector-row" style="border-bottom: 1px solid #1e293b; transition: background 0.2s;" onmouseover="this.style.background='#1e293b'" onmouseout="this.style.background='transparent'">
                            <td style="padding: 0.75rem 1rem; font-weight: bold;">${r.id}</td>
                            <td style="padding: 0.75rem 1rem; color: #94a3b8;">${r.created_at}</td>
                            <td style="padding: 0.75rem 1rem; color: #cbd5e1;">${r.shard_key}</td>
                            <td style="padding: 0.75rem 1rem; font-family: monospace; color: #a7f3d0;">${r.payload}</td>
                        </tr>`).join('');
                }).catch(err => {
                    document.getElementById('modal-table-body').innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 2rem; color: #ef4444;">Failed to connect to database.</td></tr>`;
                });
        }

        function closeInspector() { document.getElementById('inspector-modal').style.display = 'none'; }
        
        function filterType(type) {
            document.querySelectorAll('.filter-pill').forEach(btn => {
                btn.style.background = btn.innerText.toLowerCase().includes(type === 'all' ? 'all' : (type === 'sys_' ? 'system' : 'transactions')) ? '#1e293b' : 'transparent';
                btn.style.color = btn.innerText.toLowerCase().includes(type === 'all' ? 'all' : (type === 'sys_' ? 'system' : 'transactions')) ? '#f8fafc' : '#64748b';
            });
            applyModalFilters(type);
        }

        function applyModalFilters(activeType = 'all') {
            const searchVal = document.getElementById('modal-search').value.toLowerCase();
            document.querySelectorAll('.filter-pill').forEach(btn => {
                if(btn.style.background === 'rgb(30, 41, 59)' || btn.style.background === '#1e293b') {
                    if(btn.innerText.toLowerCase().includes('system')) activeType = 'sys_';
                    else if(btn.innerText.toLowerCase().includes('transactions')) activeType = 'usr_';
                }
            });

            document.querySelectorAll('.inspector-row').forEach(row => {
                const keyAttr = row.getAttribute('data-key') || '';
                const rowText = row.innerText.toLowerCase();
                const matchesType = (activeType === 'all') || keyAttr.startsWith(activeType);
                const matchesSearch = rowText.includes(searchVal);
                row.style.display = (matchesType && matchesSearch) ? '' : 'none';
            });
        }

        function showCluster() {
            document.getElementById('sharded-view').style.display = 'grid';
            document.getElementById('unsharded-view').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('unshard-btn').style.display = 'inline-block';
        }

        function triggerUnshard() {
            document.getElementById('sharded-view').style.display = 'none';
            document.getElementById('unsharded-view').style.display = 'table';
            document.getElementById('back-btn').style.display = 'inline-block';
            document.getElementById('unshard-btn').style.display = 'none';
            
            fetch('/api/unshard').then(res => res.json()).then(data => {
                document.getElementById('unsharded-body').innerHTML = data.map(r => `
                    <tr style="border-bottom:1px solid #334155">
                        <td style="padding:1rem; color:#94a3b8; font-size:0.85rem;">${r.created_at}</td>
                        <td style="font-weight:bold;">${r.id}</td>
                        <td style="font-family:monospace; color:#a7f3d0;">${r.payload}</td>
                        <td><span style="background:#334155; padding:0.2rem 0.5rem; border-radius:0.3rem; font-size:0.8rem;">${r.source_node}</span></td>
                    </tr>`).join('');
            }).catch(() => {
                document.getElementById('unsharded-body').innerHTML = '<tr><td colspan="4" style="text-align:center; padding:2rem; color:#ef4444;">Failed to fetch unsharded data.</td></tr>';
            });
        }

        async function globalKill() {
            if (!confirm("CRITICAL: This will send SIGTERM to all shards in the Vessel cluster. Data in memory will be lost. Proceed?")) return;
            try {
                const res = await fetch('/api/global-kill', { method: 'POST' });
                if (res.ok) alert("Global shutdown sequence initiated.");
            } catch (e) {
                alert("Failed to reach cluster router.");
            }
        }

        function killShard(ip, action) {
            const actionText = action === 'kill' ? 'terminate' : 'reboot';
            if (action === 'kill' && !confirm(`Are you sure you want to ${actionText} node ${ip}?`)) return;
            fetch(`/api/${action}?targetIp=${ip}`, { method: 'POST' });
        }

        connectWebSocket();
    </script>
</body>
</html>

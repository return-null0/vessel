<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vessel Architecture Control</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #020617; color: #f8fafc; padding: 2rem; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 1rem; margin-bottom: 2rem; }
        .btn { background: #10b981; color: white; border: none; padding: 0.75rem 1.5rem; font-weight: bold; border-radius: 0.5rem; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #059669; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #b91c1c; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1.5rem; }
        .shard-card { background: #0f172a; padding: 1.5rem; border-radius: 0.75rem; border: 1px solid #1e293b; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; gap: 1rem; transition: border-color 0.3s ease; }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; transition: background 0.3s ease; box-shadow: 0 0 8px rgba(0,0,0,0.5); }
        
        .action-group { display: flex; gap: 0.6rem; }
        .btn-action { border: none; padding: 0.4rem 0.8rem; font-size: 0.7rem; font-weight: bold; border-radius: 0.3rem; cursor: pointer; color: white; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-restart { background: #f59e0b; }
        .btn-restart:hover { background: #d97706; }
        .btn-kill { background: #ef4444; }
        .btn-kill:hover { background: #dc2626; }
        
        .telemetry-box { background: #1e293b; padding: 0.8rem 1rem; border-radius: 0.5rem; font-family: 'Courier New', Courier, monospace; color: #a7f3d0; border-left: 4px solid #10b981; font-size: 0.85rem; display: flex; justify-content: space-between; }
        
        .record-scroll { height: 160px; overflow-y: auto; background: #020617; border-radius: 0.4rem; padding: 0.5rem 1rem; }
        .record-scroll::-webkit-scrollbar { width: 6px; }
        .record-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        
        .record-row { display: flex; justify-content: space-between; border-bottom: 1px solid #1e293b; padding: 0.6rem 0; font-size: 0.8rem; }
        .record-row:last-child { border-bottom: none; }
        .record-key { color: #94a3b8; font-weight: 500; }
        .record-val { font-family: monospace; color: #6ee7b7; text-align: right; }
        
        .dead-node { border-color: #ef4444 !important; opacity: 0.6; }
        .restarting { animation: pulse 1.5s infinite ease-in-out; border-color: #f59e0b !important; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1 style="margin: 0; font-size: 1.5rem;">Vessel Container Array</h1>
            <div style="color: #64748b; font-size: 0.85rem; margin-top: 0.2rem;">Distributed Architecture Telemetry</div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-danger" onclick="globalKill()">Shutdown Cluster</button>
            <button class="btn" id="unshard-btn" onclick="triggerUnshard()">Build Unsharded Database</button>
            <button class="btn" id="back-btn" style="display:none; background:#334155" onclick="showCluster()">Return to Cluster View</button>
        </div>
    </div>
    
    <div id="sharded-view" class="grid"></div>
    
    <table id="unsharded-view" style="width: 100%; display: none; background:#0f172a; color:#cbd5e1; border-collapse: collapse; border-radius: 0.5rem; overflow: hidden;">
        <thead style="background: #1e293b;">
            <tr style="text-align:left; color:#94a3b8">
                <th style="padding:1rem">Timestamp</th>
                <th>Database ID</th>
                <th>Payload</th>
                <th>Source Node</th>
            </tr>
        </thead>
        <tbody id="unsharded-body"></tbody>
    </table>

    <script>
        function showCluster() {
            document.getElementById('sharded-view').style.display = 'grid';
            document.getElementById('unsharded-view').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('unshard-btn').style.display = 'inline-block';
            loadCluster();
        }

        async function loadCluster() {
            if (document.getElementById('sharded-view').style.display === 'none') return;
            
            try {
                const response = await fetch('/api/cluster-state?t=' + Date.now());
                const data = await response.json();
                
                const grid = document.getElementById('sharded-view');
                grid.innerHTML = '';
                
                data.forEach(shard => {
                    const isDown = shard.status === 'DOWN';
                    const isBooting = shard.status === 'BOOTING';
                    
                    let recordHtml = '';
                    if (shard.records && shard.records.length > 0) {
                        recordHtml = shard.records.map(r => {
                            const text = typeof r === 'string' ? r : (r.payload || JSON.stringify(r));
                            const splitIndex = text.indexOf(':');
                            
                            if (splitIndex > -1) {
                                const key = text.substring(0, splitIndex).trim();
                                const val = text.substring(splitIndex + 1).trim();
                                return `
                                    <div class="record-row">
                                        <span class="record-key">${key}</span>
                                        <span class="record-val">${val}</span>
                                    </div>`;
                            }
                            return `<div class="record-row"><span class="record-val" style="width:100%; text-align:left;">${text}</span></div>`;
                        }).join('');
                    } else if (isBooting) {
                        recordHtml = '<div style="color:#f59e0b; text-align:center; padding-top:3rem;"><strong>Rebooting Container...</strong></div>';
                    } else if (isDown) {
                        recordHtml = '<div style="color:#ef4444; text-align:center; padding-top:3rem;"><strong>Node Offline</strong></div>';
                    } else {
                        recordHtml = '<div style="color:#64748b; text-align:center; padding-top:3rem;">Awaiting telemetry sync...</div>';
                    }

                    const mem = shard.telemetry && shard.telemetry.memory_mb !== undefined ? shard.telemetry.memory_mb.toFixed(1) : '0.0';
                    const cpu = shard.telemetry && shard.telemetry.cpu_usec !== undefined ? (shard.telemetry.cpu_usec / 1000000).toFixed(2) : '0.00';
                    const statusColor = isDown ? '#ef4444' : isBooting ? '#f59e0b' : '#10b981';

                    const card = document.createElement('div');
                    card.className = `shard-card ${isDown ? 'dead-node' : ''} ${isBooting ? 'restarting' : ''}`;
                    card.innerHTML = `
                        <div class="card-header">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <span class="status-dot" style="background:${statusColor}"></span>
                                <strong style="font-size: 1.1rem; letter-spacing: 0.5px;">${shard.ip_address}</strong>
                            </div>
                            ${!isDown ? `<div class="action-group">
                                <button class="btn-action btn-restart" onclick="killShard('${shard.ip_address}', 'restart')">Restart</button>
                                <button class="btn-action btn-kill" onclick="killShard('${shard.ip_address}', 'kill')">Kill</button>
                            </div>` : ''}
                        </div>
                        <div class="telemetry-box">
                            <span>RAM: ${mem} MB</span>
                            <span>CPU: ${cpu} s</span>
                        </div>
                        <div class="record-scroll">
                            ${recordHtml}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) { 
                console.error("Telemetry poll failed. Backend may be offline."); 
            }
        }

        async function globalKill() {
            if (!confirm("CRITICAL: This will send SIGTERM to all shards in the Vessel cluster. Data in memory will be lost. Proceed?")) return;
            try {
                const res = await fetch('/api/global-kill', { method: 'POST' });
                if (res.ok) {
                    alert("Global shutdown sequence initiated.");
                    loadCluster();
                }
            } catch (e) {
                alert("Failed to reach cluster router.");
            }
        }

        function triggerUnshard() {
            document.getElementById('sharded-view').style.display = 'none';
            document.getElementById('unsharded-view').style.display = 'table';
            document.getElementById('back-btn').style.display = 'inline-block';
            document.getElementById('unshard-btn').style.display = 'none';
            
            fetch('/api/unshard').then(res => res.json()).then(data => {
                document.getElementById('unsharded-body').innerHTML = data.map(r => `
                    <tr style="border-bottom:1px solid #334155">
                        <td style="padding:1rem; color:#94a3b8; font-size:0.85rem;">${r.created_at}</td>
                        <td style="font-weight:bold;">${r.id}</td>
                        <td style="font-family:monospace; color:#a7f3d0;">${r.payload}</td>
                        <td><span style="background:#334155; padding:0.2rem 0.5rem; border-radius:0.3rem; font-size:0.8rem;">${r.source_node}</span></td>
                    </tr>`).join('');
            }).catch(() => {
                document.getElementById('unsharded-body').innerHTML = '<tr><td colspan="4" style="text-align:center; padding:2rem; color:#ef4444;">Failed to fetch unsharded data.</td></tr>';
            });
        }

        function killShard(ip, action) {
            const actionText = action === 'kill' ? 'terminate' : 'reboot';
            if (action === 'kill' && !confirm(`Are you sure you want to ${actionText} node ${ip}?`)) return;
            
            fetch('/api/' + action + '?targetIp=' + ip, { method: 'POST' }).then(() => {
                setTimeout(loadCluster, 500); 
            });
        }

        setInterval(loadCluster, 2000);
        loadCluster();
    </script>
</body>
</html>
